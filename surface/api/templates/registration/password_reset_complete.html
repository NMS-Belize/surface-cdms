{% block content %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">

  <!-- surfarce logo -->
  <link rel="icon" type="image/png" href="{% static 'images/circle_logo_small.png' %}">
  
  <title>Surface - Password reset complete</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="https://unpkg.com/material-design-lite@1.3.0/material.min.css">

  <style>
    .accent_background{
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: rgba(0, 123, 255, 0.1) !important;
      background: linear-gradient(0deg, rgba(0, 123, 255, 0.25) 0%, rgba(255, 193, 7, 0.34) 100%) !important;
    }

    .align-child-end {
      display: flex;
      flex-direction: row;
      justify-content: flex-end;
    }
    .forgot-password {
      color: black;
    }
    .cursor-pointer {
      cursor: pointer;
    }
    .ml-auto {
      margin-left: 90%;
    }
    .w-100{
      width: 100%;
    }
    .btn-outline {
      border: 1px solid black!important;
    }
    .content-action {
      width: 100%;
      display: flex;
      justify-content: flex-end;
    }
    .release-version {
      width: 100%;
      display: flex;
      justify-content: flex-start;
    }
    .content-fied {
      width: 100%;
    }
    .logo {
      background-image: url("{% static 'images/logo.png' %}");
      position: absolute;
      width: 368px;
      height: 100px;
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
    }
    .fields {
      width: 100%;
      margin-top: 120px;
    }
    .login-box {
      background-color: white;
      width: 400px;
      filter: drop-shadow(-10px -10px 20px rgba(0, 0, 0, 0.16));
      display: flex;
      flex-direction: column;
      padding: 16px;
      border-radius: 10px;
    }

    .main-auth-container {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .img-full {
      background-image: url("{% static 'images/background.png' %}");
      position: absolute;
      width: 100%;
      height: 100vh;
      background-repeat: no-repeat;
      -webkit-background-size: cover;
      -moz-background-size: cover;
      -o-background-size: cover;
      background-size: cover;
      background-position: center;
    }

    .version-label {
      position: fixed;
      bottom: 10px;
      left: 10px;
      z-index: 9999;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(4px);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 0.9rem;
    }

    .version-label a {
      text-decoration: none;
      color: #1e90ff;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .version-label i {
      font-size: 18px;
    }

    /* New wrapper */
    .login-stack {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: loginFadeIn 0.5s ease-out;
    }

    @keyframes loginFadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* New official attribution under login */
    .login-attribution {
      width: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.10);
    }
    
    .login-attribution:hover {
      transform: translateY(-1px);
      transition: 0.2s ease;
    }

    .login-attribution__img {
      width: 34px;
      height: 34px;
      object-fit: cover;
      border-radius: 50%;
      flex-shrink: 0;
      background: #f3f4f6;
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }

    .login-attribution__text {
      text-align: center;
      line-height: 1.25;
    }

    .login-attribution__label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1e90ff;
      margin-bottom: 2px;
    }

    .login-attribution__title {
      font-size: 13px;
      color: #2f2f2f;
      font-weight: 600;
    }

    @media screen and (max-width: 480px) {
      .login-box,
      .login-attribution {
        width: calc(100% - 24px);
      }

      .logo {
        width: calc(100% - 32px);
        max-width: 320px;
        height: 90px;
      }

      .login-attribution {
        gap: 8px;
        padding: 10px;
      }

      .login-attribution__img {
        width: 30px;
        height: 30px;
      }

      .login-attribution__title {
        font-size: 12px;
      }
    }

    .version-content {
      display: flex;
      align-items: center;
      gap: 6px; /* tight spacing */
      text-decoration: none;
      color: #1e90ff;
    }

    /* tiny circular flags */
    .version-flag {
      width: 16px;
      height: 16px;
      object-fit: cover;
      border-radius: 50%;
      opacity: 0.85; /* 👈 slightly toned down */
    }

    /* icon cleanup */
    #version-icon {
      font-size: 16px;
      color: #1e90ff;
    }
  </style>

</head>
<body>
  <div class="main-auth-container">
    <div class="img-full"></div>

    <!-- Add the accent background -->
    <div class="accent_background"></div>

    <!-- The login -->
    <div class="login-stack">

        <!-- The login -->
        <div class="login-box">

          <div class="logo"></div>

          <article class="card-body">
            <form class="fields" method="post">
              <h5>Password reset complete</h5>
              <p>
                Your password has been set. You may go ahead and <a href="{% url 'login' %}">sign in</a> now.
              </p>
            </form>
          </article>
        
          <div class="content-action">
            <a href="{% url 'login' %}">
              <button class="mr-1 mdl-button mdl-js-button btn-outline" style="border-radius: 4px;" type="button">
                OK
              </button>
            </a>
          </div>
        </div>

        <!-- <div class="login-attribution">
          <img
            class="login-attribution__img"
            src="{% static 'images/bz_flag.png' %}"
            alt="Belize flag"
          >

          <div class="login-attribution__text">
            <div class="login-attribution__label">Official Product</div>
            <div class="login-attribution__title">
              Product of the National Meteorological Service of Belize
            </div>
          </div>

          <img
            class="login-attribution__img"
            src="{% static 'images/nms_logo.png' %}"
            alt="Belize Met Office logo"
          >
        </div> -->

    </div>

    <!-- Release Version -->
    <div class="version-label">
      <a href="#" class="version-content">
        
        <img
          class="version-flag"
          src="{% static 'images/bz_flag.png' %}"
          alt="Flag"
        >

        <span>{{ APP_VERSION_LABEL }}</span>

        <img
          class="version-flag"
          src="{% static 'images/nms_logo.png' %}"
          alt="Flag"
        >

      </a>
    </div>

    </div>
</body>
</html>
{% endblock %}
